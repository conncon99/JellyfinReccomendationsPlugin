<div id="JellyRecConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-checkbox">
  <div data-role="content">
    <div class="content-primary">
      <form id="JellyRecConfigForm">
        <div class="verticalSection">
          <h2>Jellyfin Recommendations</h2>
          <label class="checkboxContainer">
            <input is="emby-checkbox" type="checkbox" id="Enabled" />
            <span>Enable recommendation refresh and request handling</span>
          </label>
        </div>

        <div class="inputContainer">
          <input is="emby-input" id="SeerrUrl" type="url" label="Seerr URL" />
        </div>
        <div class="inputContainer">
          <input is="emby-input" id="ApiKey" type="password" label="API Key" />
        </div>
        <div class="inputContainer">
          <input is="emby-input" id="TraktClientId" type="text" label="Trakt Client ID" />
        </div>
        <div class="inputContainer">
          <input is="emby-input" id="TraktAccessToken" type="password" label="Trakt Access Token" />
        </div>
        <div class="inputContainer">
          <input is="emby-input" id="RecommendationLibraryPath" type="text" label="Recommendation Library Directory" />
        </div>

        <details class="verticalSection">
          <summary>Advanced</summary>
          <div class="inputContainer">
            <input is="emby-input" id="SourceLibraryPaths" type="text" label="Source Library Paths (semicolon separated)" />
          </div>
          <label class="checkboxContainer">
            <input is="emby-checkbox" type="checkbox" id="EnableTraktRecommendations" />
            <span>Use Trakt personal recommendations</span>
          </label>
          <label class="checkboxContainer">
            <input is="emby-checkbox" type="checkbox" id="EnableSeerrRecommendations" />
            <span>Use Seerr/TMDb similar-title fallback</span>
          </label>
          <div class="inputContainer">
            <input is="emby-input" id="TraktWeight" type="number" min="1" max="20" label="Trakt Recommendation Weight" />
          </div>
          <div class="inputContainer">
            <input is="emby-input" id="SeerrWeight" type="number" min="1" max="20" label="Seerr Recommendation Weight" />
          </div>
          <div class="inputContainer">
            <input is="emby-input" id="RecentlyWatchedLimit" type="number" min="1" max="100" label="Recently Watched Limit" />
          </div>
          <div class="inputContainer">
            <input is="emby-input" id="RecommendationsPerSeed" type="number" min="1" max="50" label="Recommendations Per Watched Item" />
          </div>
          <div class="inputContainer">
            <input is="emby-input" id="MaxRecommendations" type="number" min="1" max="500" label="Maximum Recommendations" />
          </div>
          <div class="inputContainer">
            <input is="emby-input" id="RefreshIntervalHours" type="number" min="1" max="720" label="Refresh Interval Hours" />
          </div>
          <label class="checkboxContainer">
            <input is="emby-checkbox" type="checkbox" id="RequestOnlyFirstSeason" />
            <span>Request only season 1 for TV shows</span>
          </label>
          <label class="checkboxContainer">
            <input is="emby-checkbox" type="checkbox" id="RemoveAfterRequest" />
            <span>Remove recommendation placeholder after creating a request</span>
          </label>
        </details>

        <div>
          <button is="emby-button" type="button" id="TestConnectionButton" class="raised button-submit block">
            <span>Test Seerr</span>
          </button>
          <button is="emby-button" type="button" id="TestTraktButton" class="raised block">
            <span>Test Trakt</span>
          </button>
          <button is="emby-button" type="button" id="RefreshButton" class="raised block">
            <span>Refresh Recommendations</span>
          </button>
          <button is="emby-button" type="button" id="EnsureFolderButton" class="raised block">
            <span>Create Recommendation Folder</span>
          </button>
          <button is="emby-button" type="submit" class="raised button-submit block">
            <span>Save</span>
          </button>
        </div>
      </form>
    </div>
  </div>
  <script type="text/javascript">
    (function () {
      const pluginId = "1d1af7ee-7c42-42a0-9f03-d202274e68d5";
      const defaults = {
        Enabled: false,
        SeerrUrl: "http://seerr:5055",
        ApiKey: "",
        RecommendationLibraryPath: "",
        SourceLibraryPaths: "",
        EnableTraktRecommendations: true,
        TraktClientId: "",
        TraktAccessToken: "",
        EnableSeerrRecommendations: true,
        TraktWeight: 3,
        SeerrWeight: 1,
        RecentlyWatchedLimit: 20,
        RecommendationsPerSeed: 8,
        MaxRecommendations: 100,
        RefreshIntervalHours: 24,
        RequestOnlyFirstSeason: true,
        RemoveAfterRequest: true
      };

      function byId(id) {
        return document.getElementById(id);
      }

      function hideLoading() {
        Dashboard.hideLoadingMsg();
      }

      function readForm() {
        return {
          Enabled: byId("Enabled").checked,
          SeerrUrl: byId("SeerrUrl").value || defaults.SeerrUrl,
          ApiKey: byId("ApiKey").value,
          RecommendationLibraryPath: byId("RecommendationLibraryPath").value,
          SourceLibraryPaths: byId("SourceLibraryPaths").value,
          EnableTraktRecommendations: byId("EnableTraktRecommendations").checked,
          TraktClientId: byId("TraktClientId").value,
          TraktAccessToken: byId("TraktAccessToken").value,
          EnableSeerrRecommendations: byId("EnableSeerrRecommendations").checked,
          TraktWeight: Number(byId("TraktWeight").value || defaults.TraktWeight),
          SeerrWeight: Number(byId("SeerrWeight").value || defaults.SeerrWeight),
          RecentlyWatchedLimit: Number(byId("RecentlyWatchedLimit").value || defaults.RecentlyWatchedLimit),
          RecommendationsPerSeed: Number(byId("RecommendationsPerSeed").value || defaults.RecommendationsPerSeed),
          MaxRecommendations: Number(byId("MaxRecommendations").value || defaults.MaxRecommendations),
          RefreshIntervalHours: Number(byId("RefreshIntervalHours").value || defaults.RefreshIntervalHours),
          RequestOnlyFirstSeason: byId("RequestOnlyFirstSeason").checked,
          RemoveAfterRequest: byId("RemoveAfterRequest").checked
        };
      }

      function writeForm(config) {
        config = Object.assign({}, defaults, config || {});
        byId("Enabled").checked = !!config.Enabled;
        byId("SeerrUrl").value = config.SeerrUrl || defaults.SeerrUrl;
        byId("ApiKey").value = config.ApiKey || "";
        byId("RecommendationLibraryPath").value = config.RecommendationLibraryPath || "";
        byId("SourceLibraryPaths").value = config.SourceLibraryPaths || "";
        byId("EnableTraktRecommendations").checked = config.EnableTraktRecommendations !== false;
        byId("TraktClientId").value = config.TraktClientId || "";
        byId("TraktAccessToken").value = config.TraktAccessToken || "";
        byId("EnableSeerrRecommendations").checked = config.EnableSeerrRecommendations !== false;
        byId("TraktWeight").value = config.TraktWeight || defaults.TraktWeight;
        byId("SeerrWeight").value = config.SeerrWeight || defaults.SeerrWeight;
        byId("RecentlyWatchedLimit").value = config.RecentlyWatchedLimit || defaults.RecentlyWatchedLimit;
        byId("RecommendationsPerSeed").value = config.RecommendationsPerSeed || defaults.RecommendationsPerSeed;
        byId("MaxRecommendations").value = config.MaxRecommendations || defaults.MaxRecommendations;
        byId("RefreshIntervalHours").value = config.RefreshIntervalHours || defaults.RefreshIntervalHours;
        byId("RequestOnlyFirstSeason").checked = config.RequestOnlyFirstSeason !== false;
        byId("RemoveAfterRequest").checked = config.RemoveAfterRequest !== false;
      }

      function ensureFolder() {
        return ApiClient.ajax({
          type: "POST",
          url: ApiClient.getUrl("JellyRec/EnsureRecommendationFolder"),
          data: JSON.stringify(readForm()),
          contentType: "application/json"
        });
      }

      function loadConfig() {
        Dashboard.showLoadingMsg();
        ApiClient.getPluginConfiguration(pluginId)
          .then(writeForm)
          .catch(function () {
            Dashboard.alert("Could not load JellyRec settings.");
          })
          .finally(hideLoading);
      }

      function bindPage() {
        const page = byId("JellyRecConfigPage");
        if (!page || page.dataset.jellyRecBound === "true") {
          return;
        }

        page.dataset.jellyRecBound = "true";
        page.addEventListener("pageshow", loadConfig);
        page.addEventListener("viewshow", loadConfig);

        byId("JellyRecConfigForm").addEventListener("submit", function (event) {
          event.preventDefault();
          Dashboard.showLoadingMsg();
          ApiClient.updatePluginConfiguration(pluginId, readForm())
            .then(function (result) {
              return ensureFolder().then(function () {
                return result;
              });
            })
            .then(function (result) {
              Dashboard.processPluginConfigurationUpdateResult(result);
            })
            .catch(function () {
              Dashboard.alert("Could not save settings or create the recommendation folder. Check Jellyfin logs.");
              hideLoading();
            });
        });

        byId("TestConnectionButton").addEventListener("click", function () {
          Dashboard.showLoadingMsg();
          ApiClient.ajax({
            type: "POST",
            url: ApiClient.getUrl("JellyRec/TestConnection"),
            data: JSON.stringify(readForm()),
            contentType: "application/json"
          }).then(function () {
            Dashboard.alert("Connected to Seerr successfully.");
          }).catch(function () {
            Dashboard.alert("Could not connect to Seerr. Check the URL and API key.");
          }).finally(hideLoading);
        });

        byId("TestTraktButton").addEventListener("click", function () {
          Dashboard.showLoadingMsg();
          ApiClient.ajax({
            type: "POST",
            url: ApiClient.getUrl("JellyRec/TestTrakt"),
            data: JSON.stringify(readForm()),
            contentType: "application/json"
          }).then(function () {
            Dashboard.alert("Connected to Trakt successfully.");
          }).catch(function () {
            Dashboard.alert("Could not connect to Trakt. Check the client ID and access token.");
          }).finally(hideLoading);
        });

        byId("RefreshButton").addEventListener("click", function () {
          Dashboard.showLoadingMsg();
          ApiClient.ajax({
            type: "POST",
            url: ApiClient.getUrl("JellyRec/Refresh")
          }).then(function () {
            Dashboard.alert("Recommendation refresh completed.");
          }).catch(function () {
            Dashboard.alert("Recommendation refresh failed. Check Jellyfin logs.");
          }).finally(hideLoading);
        });

        byId("EnsureFolderButton").addEventListener("click", function () {
          Dashboard.showLoadingMsg();
          ensureFolder().then(function (result) {
            if (result && result.path) {
              byId("RecommendationLibraryPath").value = result.path;
              Dashboard.alert("Recommendation folder is ready: " + result.path);
            } else {
              Dashboard.alert("Recommendation folder is ready.");
            }
          }).catch(function () {
            Dashboard.alert("Could not create the recommendation folder. Check the path and Jellyfin permissions.");
          }).finally(hideLoading);
        });
      }

      bindPage();
    })();
  </script>
</div>
